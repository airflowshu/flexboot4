server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:flexboot4-bootstrap}
    version: 1.0.0
  banner:
    location: classpath:banner-bootstrap.txt
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${SPRING_MAIL_HOST:smtp.qq.com}
    port: ${SPRING_MAIL_PORT:465}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
    default-encoding: UTF-8

mybatis-flex:
  datasource:
    ds1:
      url: ${JDBC_URL:jdbc:postgresql://192.168.11.104:5433/flexboot4}
      username: ${JDBC_USERNAME:flexboot4}
      password: ${JDBC_PASSWORD:flexboot4}
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  inject-sql-session-on-mapper-scan: true
  global-config:
    print-banner: false

logging:
  level:
    org.springframework.context.support.PostProcessorRegistrationDelegate$BeanPostProcessorChecker: error

security:
  ignore:
    urls:
      - /resources/**
      - /static/**
      - /api/admin/auth/**
      - /v3/api-docs/**
      - /scalar/**
      - /error

operlog:
  stream:
    key: ${OPERLOG_STREAM_KEY:operlog:stream}
    group: ${OPERLOG_STREAM_GROUP:operlog-group}
    consumer: ${OPERLOG_STREAM_CONSUMER:${spring.application.name}-1}
    dedup-ttl-days: ${OPERLOG_STREAM_DEDUP_TTL_DAYS:7}

minio:
  endpoint: ${MINIO_ENDPOINT:http://192.168.11.104:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:flexboot4-files}
  public-bucket: ${MINIO_PUBLIC_BUCKET:flexboot4-public}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${minio.endpoint}}
  secure: ${MINIO_SECURE:false}

file:
  parse:
    chunk-tokens: ${FILE_PARSE_CHUNK_TOKENS:700}
    overlap-tokens: ${FILE_PARSE_OVERLAP_TOKENS:80}
    max-chunks: ${FILE_PARSE_MAX_CHUNKS:2000}
  embedding:
    stream:
      key: ${FILE_EMBEDDING_STREAM_KEY:file-embedding:stream}
      group: ${FILE_EMBEDDING_STREAM_GROUP:file-embedding-group}
      consumer: ${FILE_EMBEDDING_STREAM_CONSUMER:${spring.application.name}-1}
      dedup-ttl-days: ${FILE_EMBEDDING_STREAM_DEDUP_TTL_DAYS:7}

springdoc:
  api-docs:
    path: /v3/api-docs
scalar:
  enabled: true
  path: /scalar
