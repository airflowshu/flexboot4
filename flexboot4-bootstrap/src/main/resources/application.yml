spring:
  application:
    name: ${SPRING_APPLICATION_NAME:flexboot4-bootstrap}
    version: 1.0.1
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  # 文件上传配置
  # Spring Boot 默认最大文件大小为 1MB，这里提升至 100MB
  servlet:
    multipart:
      # 单个文件的最大大小
      max-file-size: 100MB
      # 整个请求的最大大小
      max-request-size: 100MB
  mail:
    host: smtp.qq.com
    port: 465
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true
    default-encoding: UTF-8

# MyBatis-Flex 数据源配置 (仅数据源连接信息)
# 通用配置已在 flexboot4-admin-defaults.yml 中定义
mybatis-flex:
  datasource:
    ds1:
      url: jdbc:postgresql://192.168.11.104:5433/flexboot4
      username: flexboot4
      password: flexboot4
  # 日志配置：控制是否打印 SQL 语句
  # 选项说明：
  # - org.apache.ibatis.logging.nologging.NoLoggingImpl        # 不打印日志（默认）
  # - org.apache.ibatis.logging.stdout.StdOutImpl              # 控制台打印 SQL（推荐）
  # - org.apache.ibatis.logging.slf4j.Slf4jImpl                # 使用 SLF4J（需要配置 logging level）
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: http://192.168.11.104:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: flexboot4-files
  public-bucket: flexboot4-public
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${minio.endpoint}}
  secure: false

# 日志级别配置
logging:
  level:
    # 屏蔽 MyBatis-Flex VFS 扫描和检查类的日志
    org.mybatisflex.spring.boot.SpringBootVFS: error
    # 屏蔽 MyBatis Mapper 扫描器日志（包括 Skipping MapperFactoryBean 的警告）
    org.mybatis.spring.mapper.ClassPathMapperScanner: error
    # 屏蔽 MyBatis-Flex 核心包的所有日志
    com.mybatisflex: error
    # 屏蔽 MyBatis 自动配置和初始化日志
    org.mybatis.spring.boot.autoconfigure: error
    org.apache.ibatis: error

