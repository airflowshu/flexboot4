<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${article.title}">文章预览</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; margin: 0; background: #f5f7fa; }
        .container { max-width: 920px; margin: 32px auto; padding: 24px; background: #fff; border-radius: 12px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06); }
        .title { margin: 0 0 12px; font-size: 30px; line-height: 1.35; color: #1f2329; }
        .meta { color: #667085; font-size: 14px; margin-bottom: 20px; }
        .meta span + span::before { content: "|"; margin: 0 8px; color: #d0d5dd; }
        .summary { padding: 12px 14px; background: #f8fafc; border-left: 3px solid #1677ff; color: #344054; margin-bottom: 18px; }
        .content { color: #1d2939; line-height: 1.8; }
        .content img { max-width: 100%; height: auto; }
        .content pre { background: #111827; color: #f9fafb; padding: 12px; border-radius: 6px; overflow: auto; }
        .content table { border-collapse: collapse; width: 100%; }
        .content th, .content td { border: 1px solid #e4e7ec; padding: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1 class="title" th:text="${article.title}">文章标题</h1>
    <div class="meta">
        <span th:if="${article.author != null}" th:text="'作者: ' + ${article.author}">作者</span>
        <span th:if="${article.publishTime != null}" th:text="'发布时间: ' + ${#temporals.format(article.publishTime, 'yyyy-MM-dd HH:mm:ss')}">发布时间</span>
        <span th:text="'浏览: ' + ${article.viewCount != null ? article.viewCount : 0}">浏览</span>
    </div>

    <div class="summary" th:if="${article.summary != null and !#strings.isEmpty(article.summary)}" th:text="${article.summary}">
        摘要
    </div>

    <article class="content" th:utext="${article.content}">
        正文
    </article>
</div>
</body>
</html>
