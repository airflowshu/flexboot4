# 自定义邮件配置

mail:
  sender-name: ${spring.application.name}       # 发件人显示名称
  reset-url: http://localhost:5666/auth/reset-password  # 前端重置密码页面
  token-expiration-minutes: 30    # 重置链接有效期(分钟)


springdoc:
  api-docs:
    path: /v3/api-docs
scalar:
  enabled: true
  path: /scalar


security:
  ignore:
    urls:
      - /resources/**
      - /static/**
      - /api/auth/**
      - /v3/api-docs/**
      - /scalar/**
      - /error

operlog:
  stream:
    key: ${OPERLOG_STREAM_KEY:operlog:stream}
    group: ${OPERLOG_STREAM_GROUP:operlog-group}
    consumer: ${OPERLOG_STREAM_CONSUMER:${spring.application.name}-1}
    dedup-ttl-days: ${OPERLOG_STREAM_DEDUP_TTL_DAYS:7}
