mybatis-flex:
  datasource:
    ds1:
      url: jdbc:postgresql://192.168.11.104:5433/flexboot4
      username: flexboot4
      password: flexboot4
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  inject-sql-session-on-mapper-scan: true
  global-config:
    print-banner: false

logging:
  level:
    nl.basjes: off   #关闭Yauaa版本信息打印

# 自定义邮件配置
mail:
  sender-name: ${spring.application.name}       # 发件人显示名称
  reset-url: http://localhost:5666/auth/reset-password  # 前端重置密码页面
  token-expiration-minutes: 30    # 重置链接有效期(分钟)


springdoc:
  api-docs:
    path: /v3/api-docs
scalar:
  enabled: true
  path: /scalar


security:
  ignore:
    urls:
      - /resources/**
      - /static/**
      - /api/admin/auth/**
      - /v3/api-docs/**
      - /scalar/**
      - /error

operlog:
  stream:
    key: ${OPERLOG_STREAM_KEY:operlog:stream}
    group: ${OPERLOG_STREAM_GROUP:operlog-group}
    consumer: ${OPERLOG_STREAM_CONSUMER:${spring.application.name}-1}
    dedup-ttl-days: ${OPERLOG_STREAM_DEDUP_TTL_DAYS:7}

minio:
  endpoint: http://192.168.11.104:9000
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:flexboot4-files}
  public-bucket: ${MINIO_PUBLIC_BUCKET:flexboot4-public}
  public-endpoint: ${MINIO_PUBLIC_ENDPOINT:http://192.168.11.104:9000}
  secure: false
